name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGE_REGISTRY_TOKEN

      - name: Compile
        run: mvn compile -q
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

      - name: Run tests
        run: mvn test -B
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  package:
    name: Package JAR
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGE_REGISTRY_TOKEN

      - name: Build JAR (skip tests)
        run: mvn package -DskipTests -q
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: raft-consensus-jar
          path: target/raft-consensus-*.jar
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: PACKAGE_REGISTRY_TOKEN

      - name: Build JAR for Docker
        run: mvn package -DskipTests -q
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          PACKAGE_REGISTRY_TOKEN: ${{ secrets.PACKAGE_REGISTRY_TOKEN }}

      - name: Build Docker image
        run: docker build -t raft-consensus:${{ github.sha }} .

      - name: Verify Docker image
        run: docker image inspect raft-consensus:${{ github.sha }}

